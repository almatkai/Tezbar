<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TezBar</title>
    <!-- Fonts: TezBar intentionally does not load web fonts from a CDN. If the
         Geist/Geist Mono families are installed locally, they are used; otherwise
         the CSS falls back to the system font stack. This keeps startup fast,
         works offline, and avoids leaking the user's IP to a third party. -->
  </head>
  <body class="m-0 h-screen overflow-hidden bg-transparent font-sans text-white antialiased">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
